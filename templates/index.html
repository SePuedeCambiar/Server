<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1/ cutest">
    <title>TV Orchestrator | Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --neon-purple: #bc13fe;
            --neon-blue: #00d2ff;
            --text-gray: #a0a0a0;
        }
        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
        }
        .glass-card { 
            background: var(--card-bg); 
            border: 1px solid #333; 
            border-radius: 15px; 
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.8);
        }
        .live-banner {
            background: linear-gradient(90deg, #ff0055, #bc13fe);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }
        .btn-neon-purple {
            background: var(--neon-purple);
            color: white;
            border: none;
            transition: 0.3s;
        }
        .btn-neon-purple:hover { 
            background: #9d0edb; 
            color: white; 
            box-shadow: 0 0 15px var(--neon-purple); 
        }
        .form-control, .form-select {
            background-color: #1f1f1f !important;
            border: 1px solid #333 !important;
            color: white !important;
        }
        .table-dark { --bs-table-bg: #111; }
        .bot-msg {
            color: var(--neon-blue);
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
        }
    </style>
</head>
<body class="container py-4">

    <!-- SECCIÓN 1: ESTADO LIVE -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="live-banner shadow">
                <span class="me-3">🔴 ESTADO: AL AIRE (SISTEMA ACTIVO)</span>
                <a href="http://localhost:8888/novela" target="_blank" class="btn btn-sm btn-light fw-bold">📺 VER TRANSMISIÓN AHORA</a>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <!-- COLUMNA IZQUIERDA: ASISTENTE DE CAPTURA -->
        <div class="col-md-5">
            <div class="glass-card p-4 h-100">
                <h4 class="mb-4">🤖 Asistente de Captura</h4>
                
                <!-- PASO 0: INICIO de Búsqueda -->
                <div id="initSearch">
                    <div class="mb-3">
                        <label class="form-label text-gray">Sitio de Búsqueda</label>
                        <select id="siteSelect" class="form-select"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-gray">Nombre del Anime/Película</label>
                        <div class="input-group">
                            <input type="text" id="keyword" class="form-control" placeholder="Ej: Bleach">
                            <button id="btnStart" class="btn btn-neon-purple" onclick="startBot()">Lanzar Bot</button>
                        </div>
                    </div>
                </div>

                <!-- PASO DINÁMICO: Consola de Interacción con el Bot -->
                <div id="botConsole" style="display:none;" class="mt-4 p-3 border border-info rounded bg-dark">
                    <span class="bot-msg" id="botQuestion">Iniciando bot...</span>
                    
                    <!-- Contenedor de botones (Resultados, Serie/Peli) -->
                    <div id="botOptions" class="d-grid gap-2"></div>
                    
                    <!-- Contenedor de input (Capítulo) -->
                    <div id="botInputArea" class="mt-3" style="display:none;">
                        <div class="input-group">
                            <input type="text" id="botAnswer" class="form-control" placeholder="Escribe respuesta...">
                            <button class="btn btn-outline-info" onclick="sendAnswer()">Enviar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- COLUMNA DERECHA: COLA DE REPRODUCCIÓN -->
        <div class="col-md-7">
            <div class="glass-card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4>📋 Cola de Reproducción</h4>
                    <a href="/ver_listas" class="btn btn-sm btn-outline-secondary">Ver Todo</a>
                </div>
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Título</th>
                                <th>Ep</th>
                                <th>Estado</th>
                                <th>Hora</th>
                            </tr>
                        </thead>
                        <tbody id="queueBody">
                            <!-- Cargado por JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Carga los sitios disponibles al iniciar
        async function loadSites() {
            try {
                const res = await fetch('/api/sites');
                const data = await res.json();
                const select = document.getElementById('siteSelect');
                select.innerHTML = data.sites.map(s => `<option value="${s}">${s}</option>`).join('');
            } catch (e) { console.error("Error cargando sitios", e); }
        }

        // Lanza el bot mediante el Manager
        async function startBot() {
            const site = document.getElementById('siteSelect').value;
            const kw = document.getElementById('keyword').value;
            if(!kw) return alert("Por favor escribe un nombre para buscar");

            // Enviamos la petición POST al manager
            await fetch('/add_content', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `dominio=${site}&keyword=${kw}`
            });

            // Cambiamos la interfaz a modo "Consola"
            document.getElementById('initSearch').style.display = 'none';
            document.getElementById('botConsole').style.display = 'block';
            startPolling();
        }

        // Envía una respuesta de texto (ej: el número de capítulo)
        async function sendAnswer() {
            const resp = document.getElementById('botAnswer').value;
            if(!resp) return;
            await fetch('/api/bot_answer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ respuesta: resp })
            });
            document.getElementById('botAnswer').value = '';
        }

        // Envía una respuesta rápida (click en botón)
        async function sendSimpleAnswer(val) {
            await fetch('/api/bot_answer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ respuesta: val })
            });
        }

        // El "Corazón" del Panel: Pregunta al servidor cada 2 seg qué quiere el bot
        async function startPolling() {
            setInterval(async () => {
                try {
                    const res = await fetch('/api/bot_status');
                    const state = await res.json();
                    
                    const qText = document.getElementById('botQuestion');
                    const options = document.getElementById('botOptions');
                    const inputArea = document.getElementById('botInputArea');

                    if(state.estado === 'SELECT_SHOW') {
                        qText.innerText = "🔎 Resultados encontrados. Selecciona el correcto:";
                        options.innerHTML = state.resultados.map((r, i) => 
                            `<button class="btn btn-sm btn-outline-light text-start" onclick="sendSimpleAnswer('${i+1}')">${i+1}. ${r.text}</button>`
                        ).join('');
                        inputArea.style.display = 'none';
                    } 
                    else if(state.estado === 'SELECT_TYPE') {
                        qText.innerText = `📌 ¿${state.titulo} es una Serie o una Película?`;
                        options.innerHTML = `
                            <button class="btn btn-sm btn-outline-light" onclick="sendSimpleAnswer('S')">Serie</button>
                            <button class="btn btn-sm btn-outline-light" onclick="sendSimpleAnswer('P')">Película/OVA</button>
                        `;
                        inputArea.style.display = 'none';
                    } 
                    else if(state.estado === 'SELECT_EPISODE') {
                        qText.innerText = `🔢 Indica el número de episodio de ${state.titulo}:`;
                        options.innerHTML = '';
                        inputArea.style.display = 'block';
                    } 
                    else if(state.estado === 'ERROR') {
                        qText.innerText = "❌ Error: " + state.message;
                        options.innerHTML = '<button class="btn btn-danger" onclick="location.reload()">Reiniciar Bot</button>';
                        inputArea.style.display = 'none';
                    } 
                    else if(state.estado === 'IDLE') {
                        qText.innerText = "✅ ¡Captura completada con éxito!";
                        options.innerHTML = '<button class="btn btn-success" onclick="location.reload()">Nueva Búsqueda</button>';
                        inputArea.style.display = 'none';
                    }
                } catch (e) { console.error("Error en polling:", e); }
            }, 2000);
        }

        // Actualiza la cola de reproducción cada 10 segundos
        async function updateQueue() {
            try {
                const res = await fetch('/');
                const text = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const rows = doc.querySelectorAll('tbody tr');
                
                const body = document.getElementById('queueBody');
                body.innerHTML = '';
                rows.forEach(row => { body.innerHTML += row.outerHTML; });
            } catch (e) { console.error("Error actualizando cola", e); }
        }

        window.onload = () => { 
            loadSites(); 
            updateQueue(); 
            setInterval(updateQueue, 10000); 
        };
    </script>
</body>
</html>

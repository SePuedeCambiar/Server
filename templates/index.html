<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TV Orchestrator Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #121212; color: white; }
        .card { background-color: #1e1e1e; color: white; border: 1px solid #333; }
        .btn-primary { background-color: #6200ee; border: none; }
        .btn-primary:hover { background-color: #3700b3; }
    </style>
</head>
<body class="container py-5">
    <h1 class="text-center mb-5">📺 TV System Control Panel</h1>

    <div class="row g-4">
        <!-- Columna de Acciones -->
        <div class="col-md-4">
            <div class="card p-4 shadow">
                <h3>🛠️ Acciones</h3>
                <hr>
                <!-- Botón Añadir Contenido -->
                <form action="/add_content" method="post" class="mb-3">
                    <button type="submit" class="btn btn-primary w-100 py-2">➕ Añadir Contenido (Lanzar Grabador)</button>
                </form>

                <!-- Formulario Añadir Sitio -->
                <form action="/add_site" method="post" class="mb-3">
                    <label class="form-label">Nombre del Sitio</label>
                    <input type="text" name="nombre" class="form-control mb-2" placeholder="Ej: JKanime" required>
                    <label class="form-label">Dominio</label>
                    <input type="text" name="dominio" class="form-control mb-3" placeholder="jkanime.net" required>
                    <button type="submit" class="btn btn-outline-light w-100">🌐 Registrar Sitio</button>
                </form>

                <a href="/ver_listas" class="btn btn-secondary w-100 mt-3">📋 Ver Lista Completa</a>
            </div>
        </div>

        <!-- Columna de Estado -->
        <div class="col-md-8">
            <div class="card p-4 shadow">
                <h3>🚀 Últimos Contenidos Añadidos</h3>
                <hr>
                <table class="table table-dark table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Título</th>
                            <th>Ep</th>
                            <th>Dom</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in playlist %}
                        <tr>
                            <td>{{ item.id }}</td>
                            <td>{{ item.titulo }}</td>
                            <td>{{ item.episodio }}</td>
                            <td>{{ item.dominio }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>

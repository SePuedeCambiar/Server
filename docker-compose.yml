version: '3.8'

services:
  mediamtx:
    image: bluenviron/mediamtx
    container_name: mediamtx
    ports:
      - "1935:1935"
      - "8888:8888"
      - "8554:8554"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
      - ./assets/standby_compatible.mp4:/opt/mediamtx/standby.mp4
    restart: unless-stopped

  tv-orchestrator:
    build: .
    container_name: tv-orchestrator
    ports:
      - "9001:9001" # Solo dejamos el panel de control
    volumes:
      - ./playlist.db:/app/playlist.db
      - ./configs:/app/configs
      - ./assets:/app/assets
      - /dev/shm:/dev/shm
    depends_on:
      - mediamtx
    restart: unless-stopped